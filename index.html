<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>股票回测终端原型</title>
    <link rel="stylesheet" href="./styles.css?v=20260426-readout-compact" />
  </head>
  <body>
    <div class="terminal-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">BT</div>
          <div>
            <h1>闪电回测终端</h1>
            <span id="marketStatus">A 股手动回测 · 东方财富本地行情</span>
          </div>
        </div>

        <div class="market-strip" id="marketStrip"></div>

        <div class="db-update-area">
          <button id="rebuildDb" class="text-button small" title="重新导入东方财富本地数据">更新数据</button>
          <div id="dbProgressWrap" class="db-progress-wrap" hidden>
            <div id="dbProgressBar" class="db-progress-bar"></div>
            <span id="dbProgressText" class="db-progress-text"></span>
          </div>
        </div>

        <div class="top-actions">
          <label class="field compact">
            <span>回测日期</span>
            <input id="backtestDate" type="date" />
          </label>
          <button id="prevDay" class="icon-button" title="上一交易日" aria-label="上一交易日">‹</button>
          <button id="playToggle" class="icon-button primary" title="自动推进" aria-label="自动推进">▶</button>
          <button id="nextDay" class="icon-button" title="下一交易日" aria-label="下一交易日">›</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="quote-panel">
          <div class="panel-title">
            <span>行情池</span>
            <span id="visibleDateTag"></span>
          </div>
          <div class="quote-tabs">
            <button class="quote-tab active" data-list="all">全部</button>
            <button class="quote-tab" data-list="watch">自选</button>
            <button class="quote-tab" data-list="positions">持仓</button>
          </div>
          <div class="quote-search">
            <input id="stockSearch" type="search" placeholder="代码 / 名称" />
          </div>
          <div id="quoteList" class="quote-list"></div>
        </aside>

        <section class="chart-panel">
          <div class="chart-toolbar">
            <div class="symbol-head">
              <button id="backToMarket" class="text-button">全市场</button>
              <strong id="symbolTitle">--</strong>
              <span id="symbolMeta"></span>
            </div>

            <div class="period-tabs" role="tablist" aria-label="K线周期">
              <button class="period-tab active" data-period="daily">日线</button>
              <button class="period-tab" data-period="weekly">周线</button>
              <button class="period-tab" data-period="monthly">月线</button>
            </div>

            <div class="chart-actions">
              <div class="indicator-controls">
                <label><input id="showMA" type="checkbox" checked /> MA</label>
                <label><input id="showBOLL" type="checkbox" checked /> BOLL</label>
                <div class="segmented" role="tablist" aria-label="副图指标">
                  <button class="segment active" data-panel="macd">MACD</button>
                  <button class="segment" data-panel="rsi">RSI</button>
                  <button class="segment" data-panel="kdj">KDJ</button>
                  <button class="segment" data-panel="dmi">DMI</button>
                  <button class="segment wide" data-panel="capital">资金博弈</button>
                </div>
              </div>
              <div class="tool-controls" role="toolbar" aria-label="图表工具">
                <button class="tool-button active" data-tool="cursor" title="十字光标">✚</button>
                <button class="tool-button" data-tool="line" title="画线">╱</button>
                <button class="tool-button" data-tool="range" title="区间统计">↔</button>
                <button id="zoomMore" class="tool-button" title="放大：显示更少 K 线">＋</button>
                <button id="zoomLess" class="tool-button" title="缩小：显示更多 K 线">－</button>
                <button id="clearDrawings" class="tool-button" title="清除画线">×</button>
                <span id="barCountLabel" class="bar-count">90 根</span>
              </div>
            </div>
          </div>

          <div id="marketBoard" class="market-board">
            <div class="market-board-head">
              <strong>全市场行情</strong>
              <span id="quoteCount">--</span>
            </div>
            <div id="marketIndexBoard" class="market-index-board" aria-label="大盘指数"></div>
            <div id="marketFilterBar" class="market-filter-bar" aria-label="市场筛选">
              <label><input type="checkbox" data-market-filter="main" checked /> 沪深主板</label>
              <label><input type="checkbox" data-market-filter="chinext" checked /> 创业板</label>
              <label><input type="checkbox" data-market-filter="star" /> 科创板</label>
              <label><input type="checkbox" data-market-filter="st" /> ST板</label>
            </div>
            <div class="market-table-wrap">
              <table class="market-table">
                <thead>
                  <tr>
                    <th data-sort="rank">序</th>
                    <th data-sort="symbol">代码</th>
                    <th data-sort="name">名称</th>
                    <th data-sort="market">市场</th>
                    <th data-sort="close">最新</th>
                    <th data-sort="volumeRatio">量比</th>
                    <th data-sort="pct">涨幅%</th>
                    <th data-sort="change">涨跌</th>
                    <th data-sort="open">开盘</th>
                    <th data-sort="high">最高</th>
                    <th data-sort="low">最低</th>
                    <th data-sort="volume">成交量</th>
                    <th data-sort="amount">成交额</th>
                    <th data-sort="date">日期</th>
                  </tr>
                </thead>
                <tbody id="marketTableBody"></tbody>
              </table>
            </div>
          </div>

          <div id="detailBoard" class="detail-board" hidden>
            <div class="param-bar">
              <label>MA<input id="maFast" type="number" min="2" max="250" value="5" /></label>
              <label><span class="sr-only">MA 中线</span><input id="maMid" type="number" min="2" max="250" value="10" /></label>
              <label><span class="sr-only">MA 慢线</span><input id="maSlow" type="number" min="2" max="250" value="20" /></label>
              <label>BOLL<input id="bollPeriod" type="number" min="5" max="250" value="20" /></label>
              <label>σ<input id="bollStd" type="number" min="0.5" max="5" step="0.1" value="2" /></label>
              <label>MACD<input id="macdFast" type="number" min="2" max="120" value="12" /></label>
              <label><span class="sr-only">MACD 慢线</span><input id="macdSlow" type="number" min="3" max="260" value="26" /></label>
              <label><span class="sr-only">MACD 信号</span><input id="macdSignal" type="number" min="2" max="120" value="9" /></label>
              <label>RSI<input id="rsiFast" type="number" min="2" max="120" value="6" /></label>
              <label><span class="sr-only">RSI 慢线</span><input id="rsiSlow" type="number" min="2" max="120" value="12" /></label>
              <label>KDJ<input id="kdjPeriod" type="number" min="3" max="120" value="9" /></label>
              <label>DMI<input id="dmiPeriod" type="number" min="3" max="120" value="14" /></label>
            </div>

            <div class="indicator-panel-bar">
              <label>副图数<input id="indicatorPanelCount" type="number" min="1" max="5" value="3" /></label>
              <div id="indicatorPanelControls" class="indicator-panel-controls"></div>
            </div>
            <div class="price-readout" id="priceReadout"></div>
            <div class="range-stats" id="rangeStats"></div>

            <div class="canvas-stack" id="canvasStack">
              <canvas id="priceCanvas"></canvas>
              <canvas id="volumeCanvas"></canvas>
              <canvas id="indicatorCanvas"></canvas>
              <canvas id="indicatorCanvas2"></canvas>
              <canvas id="indicatorCanvas3"></canvas>
              <canvas id="indicatorCanvas4"></canvas>
              <canvas id="indicatorCanvas5"></canvas>
            </div>
          </div>
        </section>

        <aside class="trade-panel">
          <div class="panel-title">
            <span>模拟交易</span>
            <button id="resetAccount" class="text-button">重置</button>
          </div>

          <div class="session-bar">
            <input id="sessionName" type="text" placeholder="复盘名称" />
            <button id="saveSession" class="text-button">保存</button>
            <select id="sessionSelect" title="已保存复盘"></select>
            <button id="loadSession" class="text-button">加载</button>
          </div>

          <div class="account-grid">
            <div>
              <span>总资产</span>
              <strong id="equityValue">--</strong>
            </div>
            <div>
              <span>可用资金</span>
              <strong id="cashValue">--</strong>
            </div>
            <div>
              <span>持仓市值</span>
              <strong id="marketValue">--</strong>
            </div>
            <div>
              <span>浮动盈亏</span>
              <strong id="pnlValue">--</strong>
            </div>
          </div>

          <div class="order-ticket">
            <label class="field">
              <span>交易数量</span>
              <input id="orderQty" type="number" min="100" step="100" value="1000" />
            </label>
            <div class="order-price">
              <span>当前价</span>
              <strong id="orderPrice">--</strong>
            </div>
            <div class="trade-buttons">
              <button id="buyBtn" class="buy-button">买入</button>
              <button id="sellBtn" class="sell-button">卖出</button>
            </div>
          </div>

          <div class="model-settings">
            <label><span>滑点 bps</span><input id="slippageBps" type="number" min="0" max="200" step="1" value="5" /></label>
            <label><span>佣金率 %</span><input id="commissionRate" type="number" min="0" max="1" step="0.001" value="0.025" /></label>
            <label><span>最低佣金</span><input id="minCommission" type="number" min="0" step="0.1" value="5" /></label>
            <label><span>印花税 %</span><input id="stampDutyRate" type="number" min="0" max="1" step="0.001" value="0.05" /></label>
            <label><span>涨跌停规则</span><strong id="boardRule" class="board-rule">--</strong></label>
            <label class="check-field"><input id="enforceLimit" type="checkbox" checked /><span>涨跌停</span></label>
            <label class="check-field"><input id="enforceSuspension" type="checkbox" checked /><span>停牌</span></label>
          </div>

          <div class="position-block">
            <div class="panel-title slim">
              <span>当前持仓</span>
            </div>
            <div id="positionList" class="position-list"></div>
          </div>

          <div class="trade-log-block">
            <div class="panel-title slim">
              <span>成交记录</span>
            </div>
            <div id="tradeLog" class="trade-log"></div>
          </div>
        </aside>
      </main>
    </div>

    <script src="./app.js?v=20260426-readout-compact"></script>
  </body>
</html>
